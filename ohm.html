<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>옴의 법칙 계산기</title>

<style>

body{
    margin:0;
    padding:30px;
    font-family:Pretendard,Arial,sans-serif;
    background:#f5f7fb;
}

.card{

    max-width:650px;
    margin:auto;

    background:white;

    border-radius:20px;

    box-shadow:0 15px 40px rgba(0,0,0,.08);

    padding:35px;

}

h2{

text-align:center;
font-size:40px;
margin-top:0;

}

.desc{

text-align:center;

color:#666;

margin-bottom:30px;

}

.item{

margin:30px 0;

}

label{

display:flex;

justify-content:space-between;

font-weight:bold;

margin-bottom:8px;

}

input[type=range]{

width:100%;

}

.result{

margin-top:40px;

padding:25px;

background:#edf5ff;

border-radius:15px;

text-align:center;

}

.formula{

font-size:22px;

color:#555;

}

.answer{

font-size:60px;

font-weight:bold;

color:#1e88e5;

margin-top:10px;

}

.tip{

margin-top:30px;

padding:18px;

background:#fafafa;

border-radius:10px;

line-height:1.8;

}

</style>

</head>

<body>

<div class="card">

<h2>⚡ 옴의 법칙 계산기</h2>

<div class="desc">

전압(V)과 저항(Ω)을 조절하면 전류(A)가 실시간으로 계산됩니다.

</div>

<div class="item">

<label>

<span>전압(V)</span>

<span id="vValue">12</span>

</label>

<input id="voltage" type="range" min="0" max="100" value="12">

</div>

<div class="item">

<label>

<span>저항(Ω)</span>

<span id="rValue">4</span>

</label>

<input id="resistance" type="range" min="1" max="100" value="4">

</div>

<div class="result">

<div class="formula">

I = V ÷ R

</div>

<div class="answer">

<span id="current">3.00</span> A

</div>

</div>

<div class="tip">

전압이 커질수록 전류는 증가하고,

저항이 커질수록 전류는 감소합니다.

</div>

</div>

<script>

const voltage=document.querySelector("#voltage");

const resistance=document.querySelector("#resistance");

const vValue=document.querySelector("#vValue");

const rValue=document.querySelector("#rValue");

const current=document.querySelector("#current");

function update(){

const V=Number(voltage.value);

const R=Number(resistance.value);

vValue.textContent=V;

rValue.textContent=R;

current.textContent=(V/R).toFixed(2);

}

voltage.addEventListener("input",update);

resistance.addEventListener("input",update);

update();

</script>

</body>
</html>
